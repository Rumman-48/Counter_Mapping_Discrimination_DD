name: Deploy to GitHub Pages
 
on:
  push:
    branches: [main]
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: false
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Inject secrets into HTML files
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sed -i "s|REPLACE_WITH_YOUR_API_KEY|$FIREBASE_API_KEY|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_AUTH_DOMAIN|$FIREBASE_AUTH_DOMAIN|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_PROJECT_ID|$FIREBASE_PROJECT_ID|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_STORAGE_BUCKET|$FIREBASE_STORAGE_BUCKET|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_MESSAGING_SENDER_ID|$FIREBASE_MESSAGING_SENDER_ID|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_APP_ID|$FIREBASE_APP_ID|g" index.html admin.html
          sed -i "s|REPLACE_WITH_YOUR_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" admin.html
 
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

