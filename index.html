<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Counter-Mapping Discrimination | DD</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet Draw CSS & JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <!-- Firebase SDKs (modular) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js';
        
        // Your Firebase config (keep as is)
        const firebaseConfig = {
            apiKey: "AIzaSyBQbP1yIqVh3n6h8y7Xw9z0lKjH2gFdR8c",
            authDomain: "counter-mapping-dd.firebaseapp.com",
            projectId: "counter-mapping-dd",
            storageBucket: "counter-mapping-dd.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Expose db and functions globally so app.js can use them
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        
        console.log("Firebase initialized");
    </script>
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Counter-Mapping Discrimination</div>
            <ul>
                <li><a href="index.html">Map</a></li>
                <li><a href="privacy.html">Privacy</a></li>
                <!-- Add admin link if needed -->
            </ul>
        </nav>
    </header>
    
    <main>
        <div id="map"></div>
    </main>
    
    <!-- Your custom JavaScript (must run after DOM and Leaflet) -->
    <script src="app.js"></script>
    
    <!-- Optional: add a small debugger -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM fully loaded and parsed');
            // Check if map container exists and has height
            const mapDiv = document.getElementById('map');
            if (mapDiv) {
                console.log('Map container found, height:', mapDiv.clientHeight);
                if (mapDiv.clientHeight === 0) {
                    console.warn('Map container has zero height! Check CSS.');
                }
            } else {
                console.error('Map container #map not found!');
            }
        });
    </script>
</body>
</html>
